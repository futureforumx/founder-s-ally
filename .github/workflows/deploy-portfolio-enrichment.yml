name: Deploy Portfolio Enrichment

# Deploys enrich-portfolio-websites to zmnlsdohtwztneamvwaq, applies the DB
# migration, and wires up pg_cron so the function fires every minute.
#
# Required repo secret:
#   SUPABASE_ACCESS_TOKEN  — PAT with permissions on zmnlsdohtwztneamvwaq
#
# Run ONCE manually from the Actions tab (select the feature branch).
# pg_cron handles scheduling from then on.

on:
  workflow_dispatch:

env:
  PROJECT_REF: zmnlsdohtwztneamvwaq

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── 1. Deploy edge function ───────────────────────────────────────────
      - name: Deploy enrich-portfolio-websites
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy enrich-portfolio-websites \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt
          echo "✅ Edge function deployed (no-verify-jwt → pg_cron needs no auth header)"

      # ── 2. Apply DB migrations ────────────────────────────────────────────
      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push --project-ref "$PROJECT_REF"
          echo "✅ Migrations applied"

      # ── 3. Set up pg_cron (fires every minute, batch_size=15) ─────────────
      - name: Write pg_cron SQL
        run: |
          cat > /tmp/setup_cron.sql << 'SQL'
          -- Ensure extensions are present (idempotent)
          CREATE EXTENSION IF NOT EXISTS pg_net  WITH SCHEMA extensions;
          CREATE EXTENSION IF NOT EXISTS pg_cron WITH SCHEMA extensions;

          -- Remove any stale job
          DO $$
          BEGIN
            IF EXISTS (SELECT 1 FROM cron.job WHERE jobname = 'enrich-portfolio-overnight') THEN
              PERFORM cron.unschedule('enrich-portfolio-overnight');
            END IF;
          END $$;

          -- Schedule: every minute, no auth header required (--no-verify-jwt)
          SELECT cron.schedule(
            'enrich-portfolio-overnight',
            '* * * * *',
            $cron$
            SELECT net.http_post(
              url     := 'https://zmnlsdohtwztneamvwaq.supabase.co/functions/v1/enrich-portfolio-websites',
              headers := '{"Content-Type":"application/json"}'::jsonb,
              body    := '{"batch_size":15}'::jsonb
            );
            $cron$
          );

          SELECT jobname, schedule, command
          FROM   cron.job
          WHERE  jobname = 'enrich-portfolio-overnight';
          SQL
          echo "SQL written"

      - name: Apply pg_cron setup
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db execute --project-ref "$PROJECT_REF" --file /tmp/setup_cron.sql
          echo "✅ pg_cron job scheduled — fires every minute, batch_size=15"
