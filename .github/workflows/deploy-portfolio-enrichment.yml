name: Deploy Portfolio Enrichment

# One-time manual trigger that:
#   1. Deploys the enrich-portfolio-websites edge function
#   2. Applies all pending migrations (including pg_cron job setup)
#
# Required repo secret:
#   SUPABASE_ACCESS_TOKEN  — PAT with write access to zmnlsdohtwztneamvwaq
#
# How to run:
#   Actions tab → "Deploy Portfolio Enrichment" → Run workflow
#   Select branch: claude/enrich-portfolio-companies-NlYjI
#
# After this runs once, pg_cron fires the function every minute automatically.

on:
  workflow_dispatch:

env:
  PROJECT_REF: zmnlsdohtwztneamvwaq

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ── 1. Deploy edge function (no-verify-jwt so pg_cron needs no auth) ──
      - name: Deploy enrich-portfolio-websites
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy enrich-portfolio-websites \
            --project-ref "$PROJECT_REF" \
            --no-verify-jwt
          echo "✅ Edge function deployed"

      # ── 2. Apply migrations (creates GIN index + pg_cron job) ─────────────
      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push --project-ref "$PROJECT_REF"
          echo "✅ Migrations applied — pg_cron fires every minute from now on"
